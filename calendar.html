<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>note 投稿カレンダー</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #calendar-wrapper {
      flex: 1 1 auto;
      overflow: hidden;
    }

    #calendar {
      height: 100%;
    }

    .note-title {
      margin-left: 0.3em;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<nav class="navbar navbar-light bg-light px-3">
  <span class="navbar-brand mb-0 h5">note 投稿カレンダー</span>
  <div class="btn-group">
    <button id="prevMonth" class="btn btn-sm btn-outline-primary">◀ 前月</button>
    <button id="today" class="btn btn-sm btn-outline-secondary">今月</button>
    <button id="nextMonth" class="btn btn-sm btn-outline-primary">次月 ▶</button>
  </div>
</nav>

<!-- カレンダー -->
<div id="calendar-wrapper">
  <div id="calendar"></div>
</div>

<!-- モーダル -->
<div class="modal fade" id="noteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small" id="modalDate"></p>
        <a id="modalLink" href="#" target="_blank" class="btn btn-primary btn-sm">
          noteで記事を開く
        </a>
      </div>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<!-- Hammer.js -->
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>

<script>
$(function () {

  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    headerToolbar: false,
    height: '100%',
    dayMaxEvents: true,
    events: [],
    eventClick: function(info) {
      $('#modalTitle').text(info.event.extendedProps.title);
      $('#modalDate').text(info.event.start ? new Date(info.event.start).toLocaleString() : '');
      $('#modalLink').attr('href', info.event.extendedProps.link);
      const modal = new bootstrap.Modal(document.getElementById('noteModal'));
      modal.show();
    }
  });

  calendar.render();

  /* --------- 月移動 --------- */
  function moveMonth(offset) {
    const currentDate = calendar.getDate();
    calendar.gotoDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1));
  }

  $('#prevMonth').on('click', () => moveMonth(-1));
  $('#nextMonth').on('click', () => moveMonth(1));
  $('#today').on('click', () => calendar.today());

  /* --------- スワイプ対応 --------- */
  const hammer = new Hammer(document.getElementById('calendar-wrapper'));
  hammer.on('swipeleft', () => moveMonth(1));
  hammer.on('swiperight', () => moveMonth(-1));

  /* --------- RSS取得 --------- */
  const feeds = [
    { id: 'mumeino', prefix: '📝' },
    { id: 'info', prefix: '📢' }
  ];

  feeds.forEach(feed => {
    const rssUrl = `https://note.com/${feed.id}/rss`;
    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

    $.getJSON(apiUrl, function (data) {
      data.items.forEach(item => {
        const date = new Date(item.pubDate);
        calendar.addEvent({
          title: feed.prefix + ' ' + item.title,
          start: date,
          allDay: true,
          extendedProps: {
            link: item.link,
            title: item.title
          }
        });
      });
    });
  });

});
</script>

</body>
</html>
