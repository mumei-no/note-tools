<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>note 投稿一覧</title>
</head>
<body>

<h1>note 投稿一覧</h1>
<ul id="list">読み込み中...</ul>

<script>
  const USER = "mumeino"; // ← noteユーザーID
  const RSS_URL = `https://note.com/${USER}/rss`;
  const API_URL =
    `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      data.items.forEach(item => {
        const li = document.createElement("li");
        li.innerHTML = `
          <a href="${item.link}" target="_blank">
            ${item.title}
          </a>
          <small>（${item.pubDate.slice(0, 10)}）</small>
        `;
        list.appendChild(li);
      });
    })
    .catch(err => {
      document.getElementById("list").innerText = "取得に失敗しました";
      console.error(err);
    });
</script>

</body>
</html>
