<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>note投稿カレンダー</title>

  <!-- Bulma -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

  <!-- TUI Calendar -->
  <link rel="stylesheet"
        href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body.is-dark {
      background: #1e1e1e;
    }
    body.is-dark .box {
      background: #2a2a2a;
      color: #eaeaea;
    }
    body.is-dark .title,
    body.is-dark .button {
      color: #eaeaea;
    }
    body.is-dark .button {
      background: #363636;
      border-color: #4a4a4a;
    }

    #calendar {
      height: calc(100vh - 140px);
    }
  </style>
</head>

<body>

<section class="section pb-3">
  <div class="container">
    <div class="box">
      <div class="level">
        <div class="level-left">
          <h1 class="title is-5">note投稿カレンダー（mumeino）</h1>
        </div>
        <div class="level-right">
          <div class="buttons are-small">
            <button class="button" id="prev">◀</button>
            <button class="button" id="today">今日</button>
            <button class="button" id="next">▶</button>
            <button class="button is-light" id="toggleTheme">🌙 / ☀</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section pt-0">
  <div class="container">
    <div class="box">
      <div id="calendar"></div>
    </div>
  </div>
</section>

<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

<script>
$(function () {

  let calendar;
  let events = [];

  const lightTheme = {
    common: {
      backgroundColor: '#ffffff',
      border: '1px solid #dbdbdb'
    },
    month: {
      dayName: { color: '#363636' }
    }
  };

  const darkTheme = {
    common: {
      backgroundColor: '#2a2a2a',
      border: '1px solid #444'
    },
    month: {
      dayName: { color: '#eaeaea' },
      gridCell: {
        headerHeight: 31,
        footerHeight: 0,
        border: '1px solid #444'
      },
      dayGrid: {
        backgroundColor: '#2a2a2a'
      },
      dayName: {
        color: '#eaeaea'
      },
      moreView: {
        backgroundColor: '#2a2a2a'
      },
      dayName: {
        color: '#eaeaea'
      },
      dayName: {
        color: '#eaeaea'
      }
    },
    week: {
      dayName: {
        color: '#eaeaea'
      },
      today: {
        color: '#ffd54f'
      },
      pastDay: {
        color: '#bdbdbd'
      },
      futureDay: {
        color: '#eaeaea'
      }
    }
  };

  function createCalendar(theme) {
    if (calendar) calendar.destroy();

    calendar = new tui.Calendar('#calendar', {
      defaultView: 'month',
      usageStatistics: false,
      isReadOnly: true,
      theme: theme,
      month: { startDayOfWeek: 0 }
    });

    calendar.on('clickEvent', e => {
      e.event.url && window.open(e.event.url, '_blank', 'noopener');
    });

    if (events.length) calendar.createEvents(events);
  }

  // 初期表示
  createCalendar(lightTheme);

  // 操作
  $('#prev').on('click', () => calendar.prev());
  $('#next').on('click', () => calendar.next());
  $('#today').on('click', () => calendar.today());

  $('#toggleTheme').on('click', () => {
    $('body').toggleClass('is-dark');
    createCalendar($('body').hasClass('is-dark') ? darkTheme : lightTheme);
  });

  // RSS取得
  const api =
    'https://api.rss2json.com/v1/api.json?rss_url=' +
    encodeURIComponent('https://note.com/mumeino/rss');

  $.getJSON(api, data => {
    events = data.items.map(item => {
      const d = new Date(item.pubDate);
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, '0');
      const day = String(d.getUTCDate()).padStart(2, '0');

      return {
        id: item.guid,
        calendarId: 'note',
        title: item.title,
        category: 'allday',
        start: `${y}-${m}-${day}`,
        end: `${y}-${m}-${day}`,
        url: item.link,
        backgroundColor: '#795548',
        color: '#fff'
      };
    });

    calendar.createEvents(events);
  });

});
</script>

</body>
</html>
