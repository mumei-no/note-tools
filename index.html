<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>note 投稿カレンダー（2週間）</title>

<!-- Bulma -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">

<!-- TUI Calendar -->
<link rel="stylesheet" href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css">

<style>
body.dark {
  background-color: #121212;
  color: #eaeaea;
}

/* カレンダー背景 */
body.dark .toastui-calendar-layout {
  background-color: #1e1e1e;
}

/* ダークモード時の文字色補正（重要） */
body.dark .toastui-calendar * {
  color: #eaeaea !important;
}

/* 今日の強調 */
.toastui-calendar-today {
  font-weight: bold;
}
</style>
</head>

<body>
<section class="section">
  <div class="container">
    <div class="level">
      <div class="level-left">
        <button id="prev" class="button">◀</button>
        <button id="today" class="button mx-2">Today</button>
        <button id="next" class="button">▶</button>
      </div>
      <div class="level-right">
        <button id="toggleTheme" class="button is-small">
          🌙 / ☀
        </button>
      </div>
    </div>

    <div id="calendar" style="height: 600px;"></div>
  </div>
</section>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- TUI Calendar -->
<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

<script>
let calendar;
let isDark = false;

function createCalendar() {
  if (calendar) calendar.destroy();

  calendar = new tui.Calendar('#calendar', {
    defaultView: 'month',
    month: {
      visibleWeeksCount: 2,
      isAlways6Weeks: false,
      startDayOfWeek: 0
    },
    useDetailPopup: false,
    usageStatistics: false
  });

  loadNotePosts();
}

function loadNotePosts() {
  const rssUrl = encodeURIComponent('https://note.com/mumeino/rss');
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

  $.getJSON(api, function(data) {
    const events = data.items.map(item => ({
      id: item.guid,
      calendarId: 'note',
      title: item.title,
      start: item.pubDate,
      end: item.pubDate,
      isAllDay: true,
      category: 'allday',
      raw: {
        link: item.link
      }
    }));

    calendar.createEvents(events);
  });
}

$(function() {
  createCalendar();

  $('#prev').on('click', () => calendar.prev());
  $('#next').on('click', () => calendar.next());
  $('#today').on('click', () => calendar.today());

  $('#toggleTheme').on('click', function() {
    isDark = !isDark;
    $('body').toggleClass('dark', isDark);
  });

  // イベントクリックで note を開く
  $('#calendar').on('click', '.toastui-calendar-event', function() {
    const eventId = $(this).data('event-id');
    const event = calendar.getEvent(eventId);
    if (event?.raw?.link) {
      window.open(event.raw.link, '_blank');
    }
  });
});
</script>
</body>
</html>
