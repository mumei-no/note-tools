<head>

      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    #currentMonth {
      margin-left: auto;
      font-weight: bold;
    }

    #calendar {
      height: 800px;
      background: #fff;
      border-radius: 8px;
      padding: 8px;
    }

</head>

  <button id="next">▶</button>
  <div id="currentMonth"></div>
</div>

<div id="calendar"></div>

  const API_URL =

  // ==============================
  // JST用 ISO文字列生成（Zなし）
  // ==============================
  function toLocalISOString(date) {
    const pad = n => String(n).padStart(2, '0');
    return (
      `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}` +
      `T${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`
    );
  }

  // ==============================
  // カレンダー初期化
  // ==============================
  const calendar = new Calendar('#calendar', {

    document.getElementById('currentMonth').textContent =

  }

  updateMonthLabel();

  // ==============================

  // ==============================

    calendar.prev();
    updateMonthLabel();
  };

  document.getElementById('next').onclick = () => {
    calendar.next();
    updateMonthLabel();
  };

  document.getElementById('today').onclick = () => {
    calendar.today();
    updateMonthLabel();
  };

<script>
  const USER = "mumeino";
  const RSS_URL = `https://note.com/${USER}/rss`;
  const API_URL =
    `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

  const calendar = new tui.Calendar('#calendar', {
    defaultView: 'month',
    useDetailPopup: false,
    useFormPopup: false,

    month: {
      startDayOfWeek: 0
    },

    calendars: [
      {
        id: 'note',
        name: 'note'
      }
    ]
  });

  function updateMonthLabel() {
    const d = calendar.getDate();
    document.getElementById('currentMonth').textContent =
      `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
  }

  updateMonthLabel();

  document.getElementById('prev').onclick = () => {
    calendar.prev();
    updateMonthLabel();
  };
  document.getElementById('next').onclick = () => {
    calendar.next();
    updateMonthLabel();
  };
  document.getElementById('today').onclick = () => {
    calendar.today();
    updateMonthLabel();
  };

  fetch(API_URL)
    .then(r => r.json())
    .then(data => {
      const events = data.items.map(item => {
        const start = new Date(item.pubDate);
        const end = new Date(start.getTime() + 30 * 60 * 1000);

        return {
          id: item.link,
          calendarId: 'note',
          title: item.title,
          category: 'time',
          start,
          end,
          raw: { link: item.link }
        };
      });

      calendar.createEvents(events);
    });

  calendar.on('selectEvent', e => {
    window.open(e.event.raw.link, '_blank');
  });
</script>
