      margin-bottom: 8px;

    }

  <div id="currentMonth"></div>
</div>

  // ==============================
  // JST用 ISO文字列生成（Zなし）
  // ==============================
  function toLocalISOString(date) {
    const pad = n => String(n).padStart(2, '0');
    return (
      `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}` +
      `T${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`

  }

  // カレンダー初期化
  // ==============================

    defaultView: 'month',

      startDayOfWeek: 0,
      visibleWeeksCount: 6

      hourStart: 6,

      {
        id: 'note',
        name: 'note',
        backgroundColor: '#3ea8ff'
      }
    ]

  // ==============================
  // 月ラベル更新

  function updateMonthLabel() {
    const date = calendar.getDate();
    document.getElementById('currentMonth').textContent =
      `${date.getFullYear()}年 ${date.getMonth() + 1}月`;
  }

  updateMonthLabel();

  // ==============================

  // ==============================

    calendar.prev();
    updateMonthLabel();
  };

  document.getElementById('next').onclick = () => {
    calendar.next();
    updateMonthLabel();
  };

  document.getElementById('today').onclick = () => {
    calendar.today();

  };

        to bottom,
        transparent,

        var(--line) 29px

    }

    .toastui-calendar-day-name {
      font-weight: normal;
      color: var(--accent);
    }

      font-size: 12px;
      cursor: pointer;
    }
  </style>

<body>
  <header>
    <h1>note投稿カレンダー（mumeino）</h1>
    <div class="controls">
      <button id="prev">◀</button>
      <button id="today">今日</button>
      <button id="next">▶</button>
      <button id="toggleTheme">🌙 / ☀</button>
    </div>
  </header>

  <div id="calendar"></div>

  <script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

  <script>
    const Calendar = tui.Calendar;

    const calendar = new Calendar('#calendar', {
      defaultView: 'month',
      usageStatistics: false,
      isReadOnly: true,
      month: {
        startDayOfWeek: 0
      }
    });

    // ナビゲーション
    document.getElementById('prev').onclick = () => calendar.prev();
    document.getElementById('next').onclick = () => calendar.next();
    document.getElementById('today').onclick = () => calendar.today();

    // ライト / ダーク切替
    document.getElementById('toggleTheme').onclick = () => {
      document.body.classList.toggle('dark');
    };

    // イベントクリック → note記事を開く
    calendar.on('clickEvent', ({ event }) => {
      if (event.url) {
        window.open(event.url, '_blank', 'noopener');
      }
    });

    // note RSS → rss2json
    const RSS_URL = encodeURIComponent('https://note.com/mumeino/rss');
    const API = `https://api.rss2json.com/v1/api.json?rss_url=${RSS_URL}`;

    fetch(API)
      .then(res => res.json())
      .then(data => {
        const events = data.items.map(item => {
          const date = new Date(item.pubDate);

          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, '0');
          const d = String(date.getDate()).padStart(2, '0');

          return {
            id: item.guid,
            calendarId: 'note',
            title: item.title,
            category: 'allday',
            start: `${y}-${m}-${d}`,
            end: `${y}-${m}-${d}`,
            url: item.link, // ← ここがポイント
            backgroundColor: '#6b4f3f',
            color: '#fff'
          };
        });

        calendar.createEvents(events);
      })
      .catch(err => {
        console.error(err);
        alert('投稿の取得に失敗しました');
      });
  </script>
