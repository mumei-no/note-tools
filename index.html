<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>note投稿カレンダー</title>

  <!-- Bulma -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
  />

  <!-- TUI Calendar -->
  <link
    rel="stylesheet"
    href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css"
  />

  <style>
    /* ダークモード時の補正 */
    body.is-dark {
      background-color: #1e1e1e;
    }

    body.is-dark .box {
      background-color: #2a2a2a;
      color: #eaeaea;
    }

    body.is-dark .title,
    body.is-dark .button {
      color: #eaeaea;
    }

    body.is-dark .button {
      background-color: #363636;
      border-color: #4a4a4a;
    }

    body.is-dark .button:hover {
      background-color: #404040;
    }

    #calendar {
      height: calc(100vh - 140px);
    }

    .toastui-calendar-event-title {
      cursor: pointer;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>
  <!-- ヘッダー -->
  <section class="section pb-3">
    <div class="container">
      <div class="box">
        <div class="level">
          <div class="level-left">
            <h1 class="title is-5 mb-0">
              note投稿カレンダー（mumeino）
            </h1>
          </div>
          <div class="level-right">
            <div class="buttons are-small">
              <button class="button" id="prev">◀</button>
              <button class="button" id="today">今日</button>
              <button class="button" id="next">▶</button>
              <button class="button is-light" id="toggleTheme">
                🌙 / ☀
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- カレンダー -->
  <section class="section pt-0">
    <div class="container">
      <div class="box">
        <div id="calendar"></div>
      </div>
    </div>
  </section>

  <script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

  <script>
    const Calendar = tui.Calendar;

    const calendar = new Calendar('#calendar', {
      defaultView: 'month',
      usageStatistics: false,
      isReadOnly: true,
      month: {
        startDayOfWeek: 0
      }
    });

    // ナビゲーション
    document.getElementById('prev').onclick = () => calendar.prev();
    document.getElementById('next').onclick = () => calendar.next();
    document.getElementById('today').onclick = () => calendar.today();

    // Bulma方式 ライト / ダーク切替
    document.getElementById('toggleTheme').onclick = () => {
      document.body.classList.toggle('is-dark');
    };

    // イベントクリック → note記事
    calendar.on('clickEvent', ({ event }) => {
      if (event.url) {
        window.open(event.url, '_blank', 'noopener');
      }
    });

    // note RSS → rss2json
    const RSS_URL = encodeURIComponent('https://note.com/mumeino/rss');
    const API = `https://api.rss2json.com/v1/api.json?rss_url=${RSS_URL}`;

    fetch(API)
      .then(res => res.json())
      .then(data => {
        const events = data.items.map(item => {
          const date = new Date(item.pubDate);

          // UTC日付のみ（安定）
          const y = date.getUTCFullYear();
          const m = String(date.getUTCMonth() + 1).padStart(2, '0');
          const d = String(date.getUTCDate()).padStart(2, '0');

          return {
            id: item.guid,
            calendarId: 'note',
            title: item.title,
            category: 'allday',
            start: `${y}-${m}-${d}`,
            end: `${y}-${m}-${d}`,
            url: item.link,
            backgroundColor: '#795548',
            color: '#fff'
          };
        });

        calendar.createEvents(events);
      })
      .catch(err => {
        console.error(err);
        alert('投稿の取得に失敗しました');
      });
  </script>
</body>
</html>
