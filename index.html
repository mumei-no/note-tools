<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>note 投稿カレンダー</title>

  <!-- TUI Calendar CSS -->
  <link
    rel="stylesheet"
    href="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.css"
  />

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
      background: #f6f6f6;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .toolbar button {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    #currentMonth {
      margin-left: auto;
      font-weight: bold;
    }

    #calendar {
      height: 800px;
      background: #fff;
      border-radius: 8px;
      padding: 8px;
    }
  </style>
</head>
<body>

<h1>note 投稿カレンダー</h1>

<div class="toolbar">
  <button id="prev">◀</button>
  <button id="today">今日</button>
  <button id="next">▶</button>
  <div id="currentMonth"></div>
</div>

<div id="calendar"></div>

<!-- TUI Calendar JS -->
<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

<script>
  // ===== 設定 =====
  const USER = "mumeino"; // noteユーザー名
  const RSS_URL = `https://note.com/${USER}/rss`;
  const API_URL =
    `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

  const Calendar = tui.Calendar;

  // ===== カレンダー初期化 =====
  const calendar = new Calendar('#calendar', {
    defaultView: 'month',
    useDetailPopup: false,
    useFormPopup: false,

    month: {
      startDayOfWeek: 0,
      visibleWeeksCount: 6
    },

    week: {
      hourStart: 6,
      hourEnd: 24
    },

    calendars: [
      {
        id: 'note',
        name: 'note',
        backgroundColor: '#3ea8ff'
      }
    ]
  });

  // ===== 表示中の年月ラベル =====
  function updateMonthLabel() {
    const date = calendar.getDate();
    const y = date.getFullYear();
    const m = date.getMonth() + 1;
    document.getElementById('currentMonth').textContent =
      `${y}年 ${m}月`;
  }

  updateMonthLabel();

  // ===== ナビゲーション =====
  document.getElementById('prev').onclick = () => {
    calendar.prev();
    updateMonthLabel();
  };

  document.getElementById('next').onclick = () => {
    calendar.next();
    updateMonthLabel();
  };

  document.getElementById('today').onclick = () => {
    calendar.today();
    updateMonthLabel();
  };

  // ===== RSS → イベント変換（JST表示） =====
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      const events = data.items.map(item => {
        const start = new Date(item.pubDate); // JSTで表示される
        const end = new Date(start.getTime() + 30 * 60 * 1000);

        return {
          id: item.guid || item.link,
          calendarId: 'note',
          title: item.title,
          category: 'time',
          start: start, // Dateオブジェクトのまま渡す
          end: end,
          raw: {
            link: item.link
          }
        };
      });

      calendar.createEvents(events);
    })
    .catch(err => {
      console.error(err);
      alert("データ取得に失敗しました");
    });

  // ===== クリックで note 記事を開く =====
  calendar.on('selectEvent', event => {
    const link = event.event.raw.link;
    if (link) {
      window.open(link, '_blank');
    }
  });
</script>

</body>
</html>
