    <div class="box">

    </div>
  </div>

<script src="https://uicdn.toast.com/calendar/latest/toastui-calendar.min.js"></script>

<script>
$(function () {

  const calendar = new tui.Calendar('#calendar', {
    defaultView: 'month',
    usageStatistics: false,
    isReadOnly: true,
    month: { startDayOfWeek: 0 }
  });

  // ナビゲーション & UI
  $('#prev').on('click', () => calendar.prev());
  $('#next').on('click', () => calendar.next());
  $('#today').on('click', () => calendar.today());
  $('#toggleTheme').on('click', () => $('body').toggleClass('is-dark'));

  // イベントクリック → note
  calendar.on('clickEvent', e => {
    e.event.url && window.open(e.event.url, '_blank', 'noopener');
  });

  // note RSS → rss2json
  const api =
    'https://api.rss2json.com/v1/api.json?rss_url=' +
    encodeURIComponent('https://note.com/mumeino/rss');

  $.getJSON(api, data => {
    const events = data.items.map(item => {
      const d = new Date(item.pubDate);
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, '0');
      const day = String(d.getUTCDate()).padStart(2, '0');

      return {
        id: item.guid,
        calendarId: 'note',
        title: item.title,
        category: 'allday',
        start: `${y}-${m}-${day}`,
        end: `${y}-${m}-${day}`,
        url: item.link,
        backgroundColor: '#795548',
        color: '#fff'
      };
    });

    calendar.createEvents(events);
  });

});
</script>

</body>
