<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>note カレンダー</title>

  <!-- Bulma -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
  />

  <!-- TUI Calendar -->
  <link
    rel="stylesheet"
    href="https://uicdn.toast.com/tui-calendar/latest/tui-calendar.css"
  />

  <style>
    body {
      padding: 1.5rem;
    }
    #calendar {
      height: 800px;
    }
    .note-title {
      margin-left: 0.4em;
    }
  </style>
</head>
<body>

<section class="section">
  <div class="container">
    <h1 class="title is-4">note 投稿カレンダー</h1>
    <div id="calendar"></div>
  </div>
</section>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- TUI Calendar -->
<script src="https://uicdn.toast.com/tui-calendar/latest/tui-calendar.js"></script>

<script>
$(function () {
  const calendar = new tui.Calendar("#calendar", {
    defaultView: "month",
    taskView: false,
    scheduleView: ["time"],
    useDetailPopup: false,
    useCreationPopup: false,
    month: {
      startDayOfWeek: 0
    }
  });

  const feeds = [
    {
      id: "mumeino",
      label: "",
      icon: "📝"
    },
    {
      id: "info",
      label: "📢",
      icon: "📢"
    }
  ];

  feeds.forEach(feed => {
    const url = `https://api.allorigins.win/raw?url=https://note.com/${feed.id}/rss`;

    $.get(url, function (data) {
      const items = $(data).find("item");

      items.each(function () {
        const title = $(this).find("title").text();
        const link = $(this).find("link").text();
        const pubDate = new Date($(this).find("pubDate").text());

        calendar.createSchedules([
          {
            id: link,
            calendarId: feed.id,
            title: `${feed.label}${feed.icon}<span class="note-title">${title}</span>`,
            category: "time",
            start: pubDate,
            end: pubDate,
            isReadOnly: true,
            raw: {
              link: link
            }
          }
        ]);
      });
    });
  });

  calendar.on("clickSchedule", function (e) {
    const link = e.schedule.raw.link;
    if (link) {
      window.open(link, "_blank");
    }
  });
});
</script>

</body>
</html>
